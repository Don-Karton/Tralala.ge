<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure.inc | Premium Events in Tbilisi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#F2F2F7] text-[#1C1C1E] font-sans selection:bg-blue-500 selection:text-white h-screen overflow-hidden">

    <!-- Navigation Bar -->
    <nav class="fixed top-0 inset-x-0 z-50 bg-white/80 backdrop-blur-2xl border-b border-gray-200/50 h-16">
        <div class="max-w-6xl mx-auto px-6 lg:pr-48 h-full flex items-center justify-between transition-all duration-500">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white font-black italic shrink-0 shadow-lg">A</div>
                <div class="relative h-6 overflow-hidden">
                    <h1 id="active-title" class="text-xl font-bold tracking-tight">Adventure.inc</h1>
                </div>
            </div>
            <button onclick="toggleCart(true)" class="relative p-2 bg-gray-100 rounded-full active:scale-90 transition-transform duration-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <span id="cart-count" class="hidden absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
            </button>
        </div>
    </nav>

    <!-- Main Container -->
    <main id="main-container" class="snap-y snap-mandatory h-screen overflow-y-auto scroll-smooth scrollbar-hide" style="scroll-snap-stop: always; -webkit-overflow-scrolling: touch;">
        <!-- Content will be injected by app.js -->
    </main>

    <!-- Side Navigation -->
    <nav id="side-nav" class="fixed right-8 top-1/2 -translate-y-1/2 z-50 hidden lg:flex flex-col gap-6 items-center">
        <div class="absolute h-full w-[1px] bg-gray-300/30 left-1/2 -translate-x-1/2 -z-10"></div>
        <!-- Dots will be injected by app.js -->
    </nav>

    <!-- Cart Drawer -->
    <div class="fixed inset-0 z-[100] pointer-events-none">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm opacity-0 transition-opacity duration-500 pointer-events-auto" onclick="toggleCart(false)"></div>
        <div id="cart-drawer" class="absolute right-0 top-0 w-full max-w-md bg-white h-full flex flex-col translate-x-full transition-transform duration-500 cubic-bezier(0.2, 1, 0.2, 1) pointer-events-auto shadow-2xl">
            <!-- Normal Cart Content -->
            <div id="cart-content" class="flex flex-col h-full">
                <div class="p-8 flex items-center justify-between border-b">
                    <h3 class="text-2xl font-black tracking-tight uppercase">Ваш праздник</h3>
                    <button onclick="toggleCart(false)" class="p-3 bg-gray-100 rounded-full active:scale-90 transition-transform"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                </div>
                <div id="cart-items" class="flex-1 overflow-y-auto p-8 space-y-6 scrollbar-hide">
                    <!-- Items injected by app.js -->
                </div>
                <div id="cart-footer" class="hidden p-10 border-t bg-white space-y-8">
                    <div class="flex justify-between items-end">
                        <span class="text-gray-400 font-black uppercase tracking-widest text-xs">К оплате</span>
                        <span id="cart-total-price" class="text-5xl font-black tracking-tighter">0 ₾</span>
                    </div>
                    <button onclick="completeOrder()" class="w-full h-20 bg-black text-white rounded-[2.5rem] font-black tracking-widest text-lg flex items-center justify-center gap-3 shadow-2xl active:scale-95 transition-all">ОФОРМИТЬ</button>
                </div>
            </div>
            <!-- Order Complete Message -->
            <div id="order-complete-msg" class="hidden flex-1 flex flex-col items-center justify-center p-12 text-center animate-fade-in">
                <div class="w-28 h-28 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-8 animate-bounce"><svg class="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
                <h3 class="text-4xl font-black mb-4 tracking-tighter">ПРИНЯТО!</h3>
                <p class="text-gray-500 font-medium">Adventure.inc перезвонит вам в течение 10 минут для подтверждения.</p>
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-[110] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md animate-fade-in" onclick="closeModal()"></div>
        <div id="modal-content" class="relative w-full max-w-xl bg-white rounded-t-[3.5rem] sm:rounded-[4rem] overflow-hidden animate-slide-up shadow-2xl max-h-[92vh] overflow-y-auto scrollbar-hide">
            <!-- Content injected by app.js -->
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
